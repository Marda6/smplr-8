<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>SYNTH-1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="device">

    <!-- Top panel: header + oscilloscope + controls -->
    <div class="top-panel">

      <header class="te-header">
        <span class="te-logo">SYNTH-1</span>
        <span class="te-status-right">
          <span class="te-clock" id="clock">--:--</span>
          <span class="te-batt">■■■□</span>
        </span>
      </header>

      <section class="te-display">
        <div class="te-status-bar">
          <span class="mode-label" id="mode-label">SIN</span>
          <span class="note-display" id="note-display">-- READY --</span>
          <span class="te-info" id="te-info">C3·B4</span>
        </div>
        <canvas class="waveform-display" id="waveform-display"></canvas>
      </section>

      <footer class="te-controls">
        <button class="ctrl-btn active" data-wave="sine">SINE</button>
        <button class="ctrl-btn" data-wave="square">SQR</button>
        <button class="ctrl-btn" data-wave="sawtooth">SAW</button>
        <button class="ctrl-btn" data-wave="triangle">TRI</button>
        <button class="ctrl-btn" id="btn-oct-down">OCT−</button>
        <button class="ctrl-btn" id="btn-oct-up">OCT+</button>
      </footer>

    </div>

    <!-- Bottom section: vibrato wheel + piano keyboard -->
    <div class="bottom-section">

      <div class="wheel-panel">
        <div class="wheel-label">VIBRATO</div>
        <canvas class="vibrato-wheel" id="vibrato-wheel"></canvas>
        <div class="wheel-value" id="wheel-value">0%</div>
      </div>

      <div class="keyboard-wrap">
        <div class="keyboard" id="keyboard">
          <div class="white-keys" id="white-keys"></div>
          <div class="black-keys" id="black-keys"></div>
        </div>
      </div>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
